<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ETPMEX — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161c26;--surface2:#1e2736;--surface3:#243040;
  --border:#263044;--border2:#2d3a50;
  --accent:#4a7cdc;--accent2:#5a8fef;
  --text:#e6edf3;--muted:#6e7f96;--muted2:#8899ad;
  --green:#3fb950;--orange:#f0883e;--red:#f85149;--purple:#a371f7;
  --font:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── Sidebar ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:var(--surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
.sidebar-logo{padding:1.25rem 1.25rem 1rem;border-bottom:1px solid var(--border)}
.sidebar-logo img{height:32px}
.sidebar-nav{flex:1;padding:0.75rem 0.75rem;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:0.6rem;padding:0.55rem 0.75rem;border-radius:7px;
  font-size:0.82rem;font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;border:none;
  background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(74,124,220,0.15);color:var(--accent)}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-section{font-size:0.65rem;font-weight:600;color:var(--muted);letter-spacing:0.08em;
  text-transform:uppercase;padding:0.75rem 0.75rem 0.3rem;margin-top:0.5rem}
.sidebar-footer{padding:1rem;border-top:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between}
.user-info{font-size:0.75rem}
.user-name{color:var(--text);font-weight:500}
.user-role{color:var(--muted);font-size:0.68rem;text-transform:capitalize}
.logout-btn{font-size:0.72rem;color:var(--muted);background:none;border:1px solid var(--border);
  border-radius:5px;padding:0.3rem 0.6rem;cursor:pointer;transition:all 0.15s}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Main ── */
.main{margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:1rem 1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:50}
.page-title{font-size:1rem;font-weight:600}
.upload-info{font-size:0.72rem;color:var(--muted);display:flex;align-items:center;gap:0.5rem}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.stale{background:var(--orange)}
.content{padding:1.75rem;flex:1}

/* ── Tabs ── */
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ── KPI cards ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;
  position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.blue::before{background:var(--accent)}
.kpi.green::before{background:var(--green)}
.kpi.orange::before{background:var(--orange)}
.kpi.purple::before{background:var(--purple)}
.kpi.red::before{background:var(--red)}
.kpi-label{font-size:0.7rem;color:var(--muted);margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em}
.kpi-value{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em}
.kpi-sub{font-size:0.68rem;color:var(--muted);margin-top:0.2rem}

/* ── Charts grid ── */
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem}
.chart-card.wide{grid-column:1/-1}
.chart-title{font-size:0.8rem;font-weight:600;color:var(--text);margin-bottom:1rem}
.chart-wrap{position:relative;height:220px}

/* ── Table ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
.table-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between}
.table-title{font-size:0.82rem;font-weight:600}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.75rem}
thead th{padding:0.65rem 1rem;text-align:right;color:var(--muted);font-weight:500;
  border-bottom:1px solid var(--border);white-space:nowrap;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.04em}
thead th:first-child{text-align:left}
tbody td{padding:0.6rem 1rem;text-align:right;border-bottom:1px solid var(--border);color:var(--text)}
tbody td:first-child{text-align:left;font-weight:500}
tbody tr:last-child td{border-bottom:none;font-weight:600;background:var(--surface2)}
tbody tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.65rem;font-weight:600}
.badge.green{background:rgba(63,185,80,0.15);color:var(--green)}
.badge.orange{background:rgba(240,136,62,0.15);color:var(--orange)}
.badge.blue{background:rgba(74,124,220,0.15);color:var(--accent)}

/* ── FIFO table ── */
.fifo-table thead th{font-size:0.65rem}
.fifo-table tbody td{font-size:0.72rem;padding:0.45rem 0.75rem}
.type-rtb{color:var(--green);font-weight:600;font-size:0.65rem}
.type-btc{color:var(--orange);font-weight:600;font-size:0.65rem}

/* ── Inventory tanks ── */
.inv-section{margin-bottom:1.5rem}
.inv-bp-title{font-size:0.9rem;font-weight:600;margin-bottom:1rem;color:var(--text);
  display:flex;align-items:center;gap:0.5rem}
.inv-bp-title::before{content:'';width:3px;height:1rem;background:var(--accent);border-radius:2px}
.inv-product-wrap{display:flex;flex-direction:column;gap:1rem}

/* Batch tank */
.batch-tank{background:var(--surface);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;transition:box-shadow 0.2s}
.batch-tank:hover{box-shadow:0 0 0 1px var(--accent)}
.batch-header{padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none}
.batch-left{display:flex;align-items:center;gap:0.75rem}
.batch-icon{width:36px;height:36px;border-radius:8px;background:rgba(74,124,220,0.12);
  border:1px solid rgba(74,124,220,0.2);display:flex;align-items:center;justify-content:center}
.batch-icon svg{width:18px;height:18px;stroke:var(--accent);fill:none;stroke-width:1.5}
.batch-name{font-size:0.85rem;font-weight:600}
.batch-meta{font-size:0.7rem;color:var(--muted);margin-top:0.1rem}
.batch-right{display:flex;align-items:center;gap:1.5rem}
.batch-stat{text-align:right}
.batch-stat-val{font-size:0.9rem;font-weight:700}
.batch-stat-lbl{font-size:0.65rem;color:var(--muted)}
.chevron{transition:transform 0.2s;color:var(--muted)}
.batch-tank.open .chevron{transform:rotate(180deg)}

/* Tank progress bar */
.tank-bar-wrap{padding:0 1.25rem 1rem}
.tank-bar{height:8px;background:var(--surface3);border-radius:4px;overflow:hidden;position:relative}
.tank-fill{height:100%;border-radius:4px;transition:width 0.6s ease}
.tank-fill.high{background:linear-gradient(90deg,var(--green),#4ade80)}
.tank-fill.mid{background:linear-gradient(90deg,var(--orange),#fbbf24)}
.tank-fill.low{background:linear-gradient(90deg,var(--red),#fb923c)}
.tank-pct{font-size:0.65rem;color:var(--muted);margin-top:0.3rem;text-align:right}

/* Invoice level */
.inv-detail{border-top:1px solid var(--border);padding:1rem 1.25rem;display:none}
.batch-tank.open .inv-detail{display:block}
.inv-title{font-size:0.7rem;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:0.06em;margin-bottom:0.75rem}
.invoice-group{margin-bottom:1rem}
.invoice-label{font-size:0.72rem;font-weight:600;color:var(--accent2);margin-bottom:0.5rem;
  display:flex;align-items:center;gap:0.4rem}
.invoice-label svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}

/* BOL tanks */
.bol-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:0.75rem}
.bol-tank{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
  padding:0.85rem;position:relative;overflow:hidden;transition:border-color 0.15s}
.bol-tank:hover{border-color:var(--accent)}
.bol-tank-inner{position:relative;z-index:1}
.bol-num{font-size:0.65rem;color:var(--muted);margin-bottom:0.3rem;font-weight:500}
.bol-liters{font-size:1rem;font-weight:700;line-height:1}
.bol-rem{font-size:0.65rem;color:var(--muted2);margin-top:0.15rem}
.bol-cost{font-size:0.7rem;color:var(--accent2);margin-top:0.4rem;font-weight:500}
/* Liquid fill bg */
.bol-fill-bg{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 9px 9px;transition:height 0.6s ease;opacity:0.15}
.bol-fill-bg.high{background:var(--green)}
.bol-fill-bg.mid{background:var(--orange)}
.bol-fill-bg.low{background:var(--red)}
.bol-fill-bg.empty{background:var(--red);opacity:0.05}

/* Upload panel (admin only) */
.upload-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:1.25rem;margin-bottom:1.5rem}
.upload-panel-title{font-size:0.82rem;font-weight:600;margin-bottom:1rem}
.upload-row{display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap}
.drop-zone{border:1.5px dashed var(--border);border-radius:8px;padding:0.75rem 1.25rem;
  cursor:pointer;position:relative;flex:1;min-width:200px;display:flex;align-items:center;gap:0.5rem;
  font-size:0.78rem;color:var(--muted);transition:all 0.15s}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);color:var(--text)}
.drop-zone svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:2;flex-shrink:0}
.run-btn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:0.65rem 1.25rem;
  font-family:var(--font);font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity 0.15s}
.run-btn:hover:not(:disabled){opacity:0.85}
.run-btn:disabled{opacity:0.4;cursor:not-allowed}
.upload-status{font-size:0.75rem;color:var(--muted);display:flex;align-items:center;gap:0.4rem;margin-top:0.5rem}
.upload-status.ok{color:var(--green)}
.upload-status.err{color:var(--red)}
.spinner{width:12px;height:12px;border:1.5px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);
  font-size:0.82rem;gap:0.5rem}
.empty-state{text-align:center;padding:3rem;color:var(--muted);font-size:0.82rem}
.empty-state svg{width:40px;height:40px;stroke:var(--border);fill:none;stroke-width:1.5;margin:0 auto 1rem;display:block}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-logo">
    <img src="data:image/png;base64,{{ logo }}" alt="ETPMEX">
  </div>
  <nav class="sidebar-nav">
    {% if role == 'admin' %}
    <div class="nav-section">Operations</div>
    <button class="nav-item active" onclick="showTab('overview')" id="nav-overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Overview
    </button>
    <button class="nav-item" onclick="showTab('inventory')" id="nav-inventory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inventory
    </button>
    <button class="nav-item" onclick="showTab('fifo')" id="nav-fifo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      FIFO Log
    </button>
    {% endif %}
    <div class="nav-section">Reports</div>
    <button class="nav-item {% if role == 'investor' %}active{% endif %}" onclick="showTab('investor')" id="nav-investor">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Investor Summary
    </button>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-name">{{ user }}</div>
      <div class="user-role">{{ role }}</div>
    </div>
    <a href="/logout"><button class="logout-btn">Sign out</button></a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <div class="page-title" id="page-title">Overview</div>
    <div class="upload-info" id="upload-info">
      <div class="dot stale" id="status-dot"></div>
      <span id="upload-label">No data loaded</span>
    </div>
  </div>

  <div class="content">

    <!-- OVERVIEW TAB -->
    <div class="tab-panel active" id="tab-overview">
      {% if role == 'admin' %}
      <div class="upload-panel">
        <div class="upload-panel-title">Process New File</div>
        <div class="upload-row">
          <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept=".xlsx">
            <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            <span id="fileLabel">Click to upload or drag & drop .xlsx</span>
          </div>
          <button class="run-btn" id="runBtn" disabled onclick="processFile()">Run FIFO Engine</button>
        </div>
        <div class="upload-status" id="uploadStatus"></div>
      </div>
      {% endif %}

      <div id="overview-content">
        <div class="loading"><div class="spinner"></div> Loading data…</div>
      </div>
    </div>

    <!-- INVENTORY TAB -->
    <div class="tab-panel" id="tab-inventory">
      <div id="inventory-content">
        <div class="loading"><div class="spinner"></div> Loading inventory…</div>
      </div>
    </div>

    <!-- FIFO LOG TAB -->
    <div class="tab-panel" id="tab-fifo">
      <div id="fifo-content">
        <div class="loading"><div class="spinner"></div> Loading FIFO log…</div>
      </div>
    </div>

    <!-- INVESTOR SUMMARY TAB -->
    <div class="tab-panel {% if role == 'investor' %}active{% endif %}" id="tab-investor">
      <div id="investor-content">
        <div class="loading"><div class="spinner"></div> Loading summary…</div>
      </div>
    </div>

  </div>
</div>

<script>
const ROLE = "{{ role }}";
let dashData = null;
let fileSelected = null;

// ── Tab switching ──────────────────────────────────────────────────────────────
const TAB_TITLES = {overview:'Overview',inventory:'Inventory',fifo:'FIFO Log',investor:'Investor Summary'};
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name)?.classList.add('active');
  document.getElementById('page-title').textContent = TAB_TITLES[name];
}

// ── File upload ────────────────────────────────────────────────────────────────
const dropZone  = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const runBtn    = document.getElementById('runBtn');
const fileLabel = document.getElementById('fileLabel');
const uploadStatus = document.getElementById('uploadStatus');

if (fileInput) {
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]); });
}

function setFile(f) {
  fileSelected = f;
  fileLabel.textContent = f.name;
  if (runBtn) runBtn.disabled = false;
}

async function processFile() {
  if (!fileSelected) return;
  runBtn.disabled = true;
  uploadStatus.className = 'upload-status';
  uploadStatus.innerHTML = '<div class="spinner"></div> Processing…';

  const fd = new FormData();
  fd.append('file', fileSelected);
  try {
    const res = await fetch('/process', { method: 'POST', body: fd });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error || 'Error'); }
    uploadStatus.className = 'upload-status ok';
    uploadStatus.textContent = '✓ Processed — downloading file & refreshing dashboard…';
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='FIFO_Output.xlsx'; a.click(); URL.revokeObjectURL(url);
    setTimeout(() => loadData(), 1200);
  } catch(e) {
    uploadStatus.className = 'upload-status err';
    uploadStatus.textContent = '✗ ' + e.message;
  } finally {
    if (runBtn) runBtn.disabled = false;
  }
}

// ── Load data from API ─────────────────────────────────────────────────────────
async function loadData() {
  const res = await fetch('/api/data');
  dashData = await res.json();
  if (!dashData) {
    showEmpty(); return;
  }
  updateUploadInfo();
  renderOverview();
  if (ROLE === 'admin') { renderInventory(); renderFifo(); }
  renderInvestor();
}

function updateUploadInfo() {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('upload-label');
  if (!dashData) { dot.className='dot stale'; lbl.textContent='No data loaded'; return; }
  const d = new Date(dashData.uploaded_at);
  const ago = timeSince(d);
  dot.className = 'dot';
  lbl.textContent = `${dashData.filename} · ${ago}`;
}

function timeSince(d) {
  const s = Math.floor((new Date() - d) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function showEmpty() {
  const msg = `<div class="empty-state">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    No data yet. ${ROLE==='admin'?'Upload a file above to get started.':'Contact your admin to upload data.'}
  </div>`;
  ['overview-content','inventory-content','fifo-content','investor-content'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = msg;
  });
  document.getElementById('page-title').textContent = 'Overview';
}

// ── OVERVIEW ──────────────────────────────────────────────────────────────────
function renderOverview() {
  const m = dashData.meta || {};
  const s = dashData.overall_summary || [];
  const el = document.getElementById('overview-content');

  const fmtUSD = v => v != null ? '$' + Number(v).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
  const fmtMXN = v => v != null ? Number(v).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2}) : '—';
  const fmtNum = v => v != null ? Number(v).toLocaleString('en-US', {maximumFractionDigits:0}) : '—';
  const fmtDec = v => v != null ? Number(v).toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:4}) : '—';

  // 8 KPI cards — use normalised _keys set by extract.py
  const total = s.find(r => r['Row Labels'] && r['Row Labels'].toLowerCase().includes('total')) || {};
  const tv = k => total[k] ?? null;
  // Row 1: Deployment — what went out
  // Row 2: Returns & inventory — what came back / what's left
  let html = `
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:0.75rem">
    <div class="kpi blue">
      <div class="kpi-label">Total Wired Amount</div>
      <div class="kpi-value">${fmtUSD(tv('_wired'))}</div>
      <div class="kpi-sub">USD deployed to suppliers</div>
    </div>
    <div class="kpi blue">
      <div class="kpi-label">Paid for Gallons (Allocation)</div>
      <div class="kpi-value">${fmtNum(tv('_paid_gal'))}</div>
      <div class="kpi-sub">gallons available to pull</div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">Gallons Pulled from Allocation</div>
      <div class="kpi-value">${fmtNum(tv('_pulled'))}</div>
      <div class="kpi-sub">RTB &amp; RTC delivered</div>
    </div>
    <div class="kpi orange">
      <div class="kpi-label">Remaining in Allocation</div>
      <div class="kpi-value">${fmtNum(tv('_rem_alloc'))}</div>
      <div class="kpi-sub">gallons paid, not pulled yet</div>
    </div>
  </div>
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
    <div class="kpi purple">
      <div class="kpi-label">Remaining Gallons in Inventory</div>
      <div class="kpi-value">${fmtNum(tv('_rem_inv'))}</div>
      <div class="kpi-sub">gallons at bulk plant</div>
    </div>
    <div class="kpi purple">
      <div class="kpi-label">Weighted Avg Cost in Inventory</div>
      <div class="kpi-value">${fmtDec(tv('_avg_cost'))}</div>
      <div class="kpi-sub">MXN/L</div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">Amount Paid Back by Mexico</div>
      <div class="kpi-value">${fmtMXN(tv('_paid_back'))}</div>
      <div class="kpi-sub">MXN received back</div>
    </div>
    <div class="kpi red">
      <div class="kpi-label">Mexico Balance</div>
      <div class="kpi-value">${fmtMXN(tv('_balance'))}</div>
      <div class="kpi-sub">MXN outstanding</div>
    </div>
  </div>`;

  // Overall Summary table — exact Excel columns
  const suppliers = s.filter(r => r['Row Labels'] && !r['Row Labels'].toLowerCase().includes('total'));
  const rows = total['Row Labels'] ? [...suppliers, total] : suppliers;

  // Detect column names (handle both old and new naming)
  const colPaidGal   = suppliers[0]?.['Paid for Gallons (Allocation)'] !== undefined ? 'Paid for Gallons (Allocation)' : 'Paid for Gallons ';
  const colPulled    = suppliers[0]?.['Gallons Pulled from Allocation (RTB & RTC)'] !== undefined ? 'Gallons Pulled from Allocation (RTB & RTC)' : 'Gallons Pulled (RTB & RTC)';
  const colPaidBack  = suppliers[0]?.['Amount Paid Back by Mexico'] !== undefined ? 'Amount Paid Back by Mexico' : 'Amount Paid Back by Mexico ';

  html += `<div class="table-card">
    <div class="table-header"><div class="table-title">Overall Summary</div></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Supplier</th>
        <th>Total Wired Amount</th>
        <th>Paid for Gallons (Allocation)</th>
        <th>Gallons Pulled from Allocation (RTB &amp; RTC)</th>
        <th>Remaining Gallons in Allocation</th>
        <th>Remaining Gallons in Inventory</th>
        <th>Weighted Avg Cost in Inventory (MXN/L)</th>
        <th>Amount Paid Back by Mexico (MXN)</th>
        <th>Mexico Balance (MXN)</th>
      </tr></thead><tbody>`;

  rows.forEach(r => {
    html += `<tr>
      <td>${r['Row Labels'] || ''}</td>
      <td>${fmtUSD(r['_wired'])}</td>
      <td>${fmtNum(r['_paid_gal'])}</td>
      <td>${fmtNum(r['_pulled'])}</td>
      <td>${fmtNum(r['_rem_alloc'])}</td>
      <td>${fmtNum(r['_rem_inv'])}</td>
      <td>${fmtDec(r['_avg_cost'])}</td>
      <td>${fmtMXN(r['_paid_back'])}</td>
      <td>${fmtMXN(r['_balance'])}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;
  el.innerHTML = html;
}

function chartOpts(unit) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#6e7f96',font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:ctx=>{
      const v=ctx.raw; return ` ${ctx.dataset.label}: ${Number(v).toLocaleString('en-US',{maximumFractionDigits:0})} ${unit}`;
    }}}},
    scales:{
      x:{ticks:{color:'#6e7f96',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'transparent'}},
      y:{ticks:{color:'#6e7f96',font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'transparent'}},
    }
  };
}

// ── INVENTORY ─────────────────────────────────────────────────────────────────
function renderInventory() {
  const inv = dashData.inventory || {};
  const el = document.getElementById('inventory-content');
  if (!Object.keys(inv).length) { el.innerHTML = '<div class="empty-state">No inventory data.</div>'; return; }

  let html = '';
  for (const [bp, products] of Object.entries(inv)) {
    html += `<div class="inv-section"><div class="inv-bp-title">${bp}</div><div class="inv-product-wrap">`;
    for (const [prod, batches] of Object.entries(products)) {
      for (const [batch, suppliers] of Object.entries(batches)) {
        // Compute batch totals across all suppliers/invoices/bols
        let totalL = 0, remL = 0, allCostPairs = [];
        for (const invMap of Object.values(suppliers))
          for (const bols of Object.values(invMap))
            for (const b of bols) {
              totalL += b.liters || 0;
              remL   += b.remaining_l || 0;
              allCostPairs.push([b.liters || 0, b.cost_per_l || 0]);
            }

        const pct = totalL > 0 ? Math.round(remL / totalL * 100) : 0;
        const fillClass = pct > 60 ? 'high' : pct > 25 ? 'mid' : 'low';
        const totalW = allCostPairs.reduce((s,[l])=>s+l, 0);
        const avgCost = totalW > 0 ? allCostPairs.reduce((s,[l,c])=>s+l*c, 0) / totalW : 0;
        const pctColor = pct > 60 ? 'green' : pct > 25 ? 'orange' : 'red';

        const batchId = `batch-${bp}-${prod}-${batch}`.replace(/[\s|]/g,'_');
        html += `<div class="batch-tank" id="${batchId}">
          <div class="batch-header" onclick="toggleBatch('${batchId}')">
            <div class="batch-left">
              <div class="batch-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
              <div><div class="batch-name">${prod} · Batch ${batch}</div><div class="batch-meta">${bp}</div></div>
            </div>
            <div class="batch-right">
              <div class="batch-stat"><div class="batch-stat-val">${fmtL(remL)}</div><div class="batch-stat-lbl">Remaining L</div></div>
              <div class="batch-stat"><div class="batch-stat-val">${fmtL(totalL)}</div><div class="batch-stat-lbl">Total RTB L</div></div>
              <div class="batch-stat"><div class="batch-stat-val">${avgCost.toFixed(4)}</div><div class="batch-stat-lbl">Avg MXN/L</div></div>
              <div class="batch-stat"><div class="batch-stat-val" style="color:var(--${pctColor})">${pct}%</div><div class="batch-stat-lbl">Remaining</div></div>
              <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
          </div>
          <div class="tank-bar-wrap">
            <div class="tank-bar"><div class="tank-fill ${fillClass}" style="width:${pct}%"></div></div>
            <div class="tank-pct">${fmtL(remL)} of ${fmtL(totalL)} L remaining</div>
          </div>
          <div class="inv-detail">
            <div class="inv-title">Supplier → Invoice → BOL breakdown</div>`;

        // Drill: supplier -> invoice -> bols
        for (const [supplier, invMap] of Object.entries(suppliers)) {
          html += `<div style="margin-bottom:1rem">
            <div style="font-size:0.72rem;font-weight:600;color:var(--muted2);margin-bottom:0.5rem;text-transform:uppercase;letter-spacing:0.05em">${supplier}</div>`;
          for (const [inv_num, bols] of Object.entries(invMap)) {
            html += `<div class="invoice-group">
              <div class="invoice-label">
                <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Invoice ${inv_num}
              </div>
              <div class="bol-grid">`;
            for (const b of bols) {
              const bpct = b.liters > 0 ? Math.round(b.remaining_l / b.liters * 100) : 0;
              const bfc  = bpct > 60 ? 'high' : bpct > 25 ? 'mid' : bpct > 0 ? 'low' : 'empty';
              html += `<div class="bol-tank">
                <div class="bol-fill-bg ${bfc}" style="height:${bpct}%"></div>
                <div class="bol-tank-inner">
                  <div class="bol-num">BOL ${b.bol}</div>
                  <div class="bol-liters">${fmtL(b.remaining_l)}<span style="font-size:0.6rem;color:var(--muted);font-weight:400"> L</span></div>
                  <div class="bol-rem">of ${fmtL(b.liters)} L · ${bpct}%</div>
                  <div class="bol-cost">${b.cost_per_l?.toFixed(4)} MXN/L</div>
                </div>
              </div>`;
            }
            html += `</div></div>`;
          }
          html += `</div>`;
        }

        html += `</div></div>`;
      }
    }
    html += `</div></div>`;
  }

  el.innerHTML = html;
}

function toggleBatch(id) {
  document.getElementById(id).classList.toggle('open');
}
function fmtL(v) { return Number(v||0).toLocaleString('en-US',{maximumFractionDigits:0}); }

// ── FIFO LOG ──────────────────────────────────────────────────────────────────
function renderFifo() {
  const rows = dashData.fifo_rows || [];
  const el = document.getElementById('fifo-content');
  if (!rows.length) { el.innerHTML='<div class="empty-state">No FIFO data.</div>'; return; }

  const headers = Object.keys(rows[0]);
  let html = `<div class="table-card">
    <div class="table-header"><div class="table-title">FIFO Allocation Log</div><div style="font-size:0.72rem;color:var(--muted)">${rows.length} entries</div></div>
    <div class="table-wrap"><table class="fifo-table"><thead><tr>`;
  headers.forEach(h => { html += `<th>${h}</th>`; });
  html += `</tr></thead><tbody>`;

  rows.forEach(r => {
    html += '<tr>';
    headers.forEach(h => {
      let v = r[h];
      if (h === 'Type') {
        html += `<td><span class="type-${(v||'').toLowerCase()}">${v||''}</span></td>`;
      } else if (typeof v === 'number') {
        html += `<td>${Number(v).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4})}</td>`;
      } else {
        html += `<td>${v ?? '—'}</td>`;
      }
    });
    html += '</tr>';
  });

  html += `</tbody></table></div></div>`;
  el.innerHTML = html;
}

// ── INVESTOR SUMMARY ──────────────────────────────────────────────────────────
function renderInvestor() {
  const inv = dashData.investment || {};
  const el = document.getElementById('investor-content');
  if (!inv.commits) { el.innerHTML = '<div class="empty-state">No investment data.</div>'; return; }

  const fmxn = v => v != null ? Number(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}) : '—';
  const fusd = v => v != null ? '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}) : '—';
  const fmxnd = v => v != null ? Number(v).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}) : '—';
  const fpct = v => v != null ? (Number(v)*100).toFixed(2)+'%' : '—';
  const fnum = (v,d=2) => v != null ? Number(v).toFixed(d) : '—';
  const date = inv.as_of ? new Date(inv.as_of).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}) : '—';

  // ── Header ──
  let html = `
  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--border)">
    <div>
      <div style="font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)">ETP — Investor Performance Report</div>
      <div style="font-size:0.72rem;color:var(--muted);margin-top:0.2rem;font-style:italic">All figures in MXN &amp; Liters</div>
    </div>
    <div style="text-align:right">
      <div style="font-size:0.7rem;color:var(--muted)">As of ${date}</div>
      <div style="font-size:0.68rem;color:var(--muted);margin-top:0.1rem">${dashData.filename||''}</div>
    </div>
  </div>`;

  // ── Committed Capital ──
  html += `
  <div style="margin-bottom:1.5rem">
    <div style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)">Committed Capital</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Round</th><th style="text-align:right">Committed (USD)</th><th style="text-align:right">Committed (MXN)</th><th style="text-align:right">Date</th><th style="text-align:right">FX Rate</th>
      </tr></thead><tbody>`;
  (inv.commits||[]).forEach(c => {
    html += `<tr>
      <td><span style="font-size:0.7rem;padding:2px 8px;border-radius:4px;background:rgba(74,124,220,0.12);color:var(--accent);font-weight:600">${c.round}</span></td>
      <td style="text-align:right">$${Number(c.usd).toLocaleString('en-US',{minimumFractionDigits:0})}</td>
      <td style="text-align:right">$${Number(c.mxn).toLocaleString('en-US',{minimumFractionDigits:0})}</td>
      <td style="text-align:right;color:var(--muted)">${c.date}</td>
      <td style="text-align:right;color:var(--muted)">${c.fx}</td>
    </tr>`;
  });
  html += `<tr style="font-weight:600;background:var(--surface2)">
    <td>Total Committed Capital</td>
    <td style="text-align:right">$${Number(inv.total_committed_usd||0).toLocaleString('en-US',{minimumFractionDigits:0})}</td>
    <td style="text-align:right">$${Number(inv.total_committed_mxn||0).toLocaleString('en-US',{minimumFractionDigits:0})}</td>
    <td colspan="2"></td>
  </tr></tbody></table></div></div>`;

  // ── KPI bar ──
  const kpis = [
    {label:'Total Committed',  val:'$'+fmxn(inv.total_committed_mxn), sub:'MXN'},
    {label:'Active Capital',   val:'$'+fmxn(inv.active_capital),       sub:'MXN deployed'},
    {label:'Available Capital',val:'$'+fmxn(inv.available),            sub:'MXN uninvested'},
    {label:'Recovered Capital',val:'$'+fmxn(inv.recovered_mxn),        sub:'MXN returned', green:true},
    {label:'Revolved Multiple',val:(Number(inv.revolved||0)).toFixed(2)+'×', sub:'capital turns'},
    {label:'Total Profit',     val:'$'+fmxn(inv.total_margin),         sub:'MXN gross', green:true},
    {label:'Investor Share',   val:'$'+fmxn(inv.investor_share),       sub:(Math.round((inv.inv_share_pct||0.4)*100))+'% of profit', green:true},
  ];
  html += `<div style="margin-bottom:1.5rem">
    <div style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)">Key Performance Indicators (MXN)</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">`;
  kpis.forEach(k => {
    html += `<div style="background:var(--surface2);border-radius:8px;padding:0.7rem 0.6rem;text-align:center">
      <div style="font-size:0.62rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);margin-bottom:4px;line-height:1.3">${k.label}</div>
      <div style="font-size:0.95rem;font-weight:700;color:${k.green?'var(--green)':'var(--text)'}">${k.val}</div>
      <div style="font-size:0.62rem;color:var(--muted);margin-top:2px">${k.sub}</div>
    </div>`;
  });
  html += `</div></div>`;

  // ── Active Capital ──
  const ad = inv.active_detail || {};
  html += `<div style="margin-bottom:1.5rem">
    <div style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)">Active Capital — investor capital funding loads not yet collected</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Type</th><th style="text-align:right">Capital (MXN)</th><th style="text-align:right">Liters</th></tr></thead>
      <tbody>
        <tr><td style="color:var(--muted)">Allocation</td><td style="text-align:right">${ad.alloc_mxn>0?'$'+fmxn(ad.alloc_mxn):'—'}</td><td style="text-align:right;color:var(--muted)">${ad.alloc_liters>0?fmxn(ad.alloc_liters):'—'}</td></tr>
        <tr><td style="color:var(--muted)">Bulk Plant Inventory</td><td style="text-align:right">${ad.inv_mxn>0?'$'+fmxn(ad.inv_mxn):'—'}</td><td style="text-align:right;color:var(--muted)">${ad.inv_liters>0?fmxn(ad.inv_liters):'—'}</td></tr>
        <tr><td style="color:var(--muted)">RTC (payment pending)</td><td style="text-align:right">${ad.rtc_pend_mxn>0?'$'+fmxn(ad.rtc_pend_mxn):'—'}</td><td style="text-align:right;color:var(--muted)">${ad.rtc_pend_liters>0?fmxn(ad.rtc_pend_liters):'—'}</td></tr>
        <tr><td style="color:var(--muted)">BTC (payment pending)</td><td style="text-align:right">${ad.btc_pend_mxn>0?'$'+fmxn(ad.btc_pend_mxn):'—'}</td><td style="text-align:right;color:var(--muted)">${ad.btc_pend_liters>0?fmxn(ad.btc_pend_liters):'—'}</td></tr>
        <tr style="font-weight:600;background:var(--surface2)"><td>Total Active Capital</td><td style="text-align:right">$${fmxn(ad.total_mxn)}</td><td style="text-align:right;color:var(--muted)">${fmxn(ad.total_liters)}</td></tr>
      </tbody>
    </table></div></div>`;

  // ── Recovered Capital ──
  const rd = inv.recovered_detail || {};
  const recRows = [
    ['RTC', rd.rtc||{}],
    ['BTC', rd.btc||{}],
    ['Total Recovered', rd.total||{}, true],
  ];
  html += `<div style="margin-bottom:1.5rem">
    <div style="font-size:0.68rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.6rem;padding-bottom:0.4rem;border-bottom:1px solid var(--border)">Recovered Capital — cumulative from fully collected loads</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Type</th>
        <th style="text-align:right">Recovered (MXN)</th>
        <th style="text-align:right">Liters</th>
        <th style="text-align:right">Gross Profit (MXN)</th>
        <th style="text-align:right">Avg ROI</th>
        <th style="text-align:right">Avg Margin (MXN/L)</th>
        <th style="text-align:right">Avg Margin (USD/Gal)</th>
      </tr></thead><tbody>`;
  recRows.forEach(([label, d, isTot]) => {
    const style = isTot ? 'font-weight:600;background:var(--surface2)' : '';
    const gc = d.margin>0 ? 'color:var(--green)' : '';
    html += `<tr style="${style}">
      <td style="color:${isTot?'inherit':'var(--muted)'}">${label}</td>
      <td style="text-align:right;${gc}">${d.mxn>0?'$'+fmxn(d.mxn):'—'}</td>
      <td style="text-align:right;color:var(--muted)">${d.liters>0?fmxn(d.liters):'—'}</td>
      <td style="text-align:right;${gc}">${d.margin>0?'$'+fmxn(d.margin):'—'}</td>
      <td style="text-align:right;${gc}">${d.roi>0?fpct(d.roi):'—'}</td>
      <td style="text-align:right">${d.mxnl>0?'$'+fnum(d.mxnl,4):'—'}</td>
      <td style="text-align:right">${d.usdgal>0?'$'+fnum(d.usdgal,2):'—'}</td>
    </tr>`;
  });
  html += `</tbody></table></div></div>`;

  // ── Disclaimer ──
  html += `<div style="font-size:0.68rem;color:var(--muted);font-style:italic;margin-top:0.5rem;padding-top:0.75rem;border-top:1px solid var(--border)">
    This document is prepared for informational purposes only. Past performance does not guarantee future results. All figures sourced from ETP operational records.
  </div>`;

  el.innerHTML = html;
}
